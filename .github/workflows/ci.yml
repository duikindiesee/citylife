name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Never execute fork-authored code on kooker1. Same-repository branches are
    # the trusted contributor lane; pushes to main remain covered as well.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Windows, X64, citylife-webgl, kooker1-gpu]
    timeout-minutes: 60
    env:
      CITYLIFE_HARDWARE_WEBGL: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # The host keeps npm's cache between jobs; actions/setup-node's cache-save
      # post-step can hang on Windows self-hosted runners.
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:e2e
      # Explicit step-level bound (PLAYER.MOBILE.E2E.1): the mobile/touch harness has its own
      # 90s whole-test timeout and a wrapper-enforced OS-level process-tree kill, but this step
      # timeout is the hosted backstop of last resort so a harness regression can never silently
      # consume the shared 60-minute job budget.
      - run: npm run test:e2e:mobile-harness
        timeout-minutes: 4
      - run: npm run build
